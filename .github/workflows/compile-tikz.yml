name: Compile TikZ PDFs

on:
  push:
    paths:
      - "src/**"
      - ".github/workflows/compile-tikz.yml"
  pull_request:
    paths:
      - "src/**"
      - ".github/workflows/compile-tikz.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-xetex \
            texlive-lang-chinese \
            texlive-latex-extra

      - name: Compile TeX files to PDF
        env:
          CTEX_FONTSET: fandol
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p output
          tex_files=(src/*.tex)

          if [ ${#tex_files[@]} -eq 0 ]; then
            echo "No TeX files found in src/"
            exit 1
          fi

          for tex_file in "${tex_files[@]}"; do
            latexmk \
              -xelatex \
              -interaction=nonstopmode \
              -halt-on-error \
              -file-line-error \
              -outdir=output \
              "${tex_file}"
          done

          ls -lh output/*.pdf

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdfs
          path: output/*.pdf
          if-no-files-found: error

      - name: Commit generated PDFs
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update compiled PDFs"
          file_pattern: "output/*.pdf"
