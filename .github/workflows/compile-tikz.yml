name: Compile TikZ Assets

on:
  push:
    paths:
      - "src/**"
      - "scripts/build_assets.sh"
      - "scripts/build_assets.ps1"
      - ".github/workflows/compile-tikz.yml"
  pull_request:
    paths:
      - "src/**"
      - "scripts/build_assets.sh"
      - "scripts/build_assets.ps1"
      - ".github/workflows/compile-tikz.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            poppler-utils \
            pdf2svg \
            texlive-xetex \
            texlive-lang-chinese \
            texlive-latex-extra

      - name: Clean generated asset files
        run: |
          mkdir -p output
          find output -type f \( -name "*.pdf" -o -name "*.png" -o -name "*.svg" \) -delete
          find output -depth -type d -empty -delete
          mkdir -p output

      - name: Compile TeX files to PDF, PNG, and SVG
        env:
          CTEX_FONTSET: fandol
          SOURCE_NAMES: src
          OUTPUT_DIR: output
          KEEP_INTERMEDIATES: "0"
        run: |
          ./scripts/build_assets.sh

      - name: Upload PDF, PNG, and SVG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-assets
          path: |
            output/*.pdf
            output/*.png
            output/*.svg
          if-no-files-found: error

      - name: Commit generated PDF, PNG, and SVG files
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update compiled assets"
          file_pattern: "output"
