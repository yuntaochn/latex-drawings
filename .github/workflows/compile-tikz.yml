name: Build LaTeX Figures

# 触发条件：push 到 main 分支就自动编译
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 LaTeX 环境
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ""  # 我们用 Makefile 批量编译
          compiler: pdflatex

      - name: 编译所有图片
        run: make

      - name: 上传生成的图片（供下载）
        uses: actions/upload-artifact@v4
        with:
          name: tikz-figures  # 下载包名
          path: images/       # 只上传生成的图片目录